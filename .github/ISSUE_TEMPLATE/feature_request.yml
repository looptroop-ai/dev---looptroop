name: Feature request
description: Suggest an improvement to LoopTroop.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, or API you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - LLM Council planning
        - Ralph loop recovery
        - OpenCode orchestration
        - OpenCode worktrees
        - Human approval gates
        - Draft PR review
        - Durable agent artifacts
        - Docs
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What existing workflow or workaround have you tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, redacted logs, or examples.
