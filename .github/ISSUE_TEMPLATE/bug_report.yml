name: Bug report
description: Report a reproducible problem in LoopTroop.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private repository code, API keys, or sensitive prompt content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable reproduction.
      placeholder: |
        1. Attach project...
        2. Start ticket...
        3. Approve...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Interview / PRD / beads planning
        - LLM Council
        - Ralph loop / retry
        - OpenCode orchestration
        - Worktree isolation
        - Dashboard UI
        - SQLite / artifacts / logs
        - Docs
        - Other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, npm version, OpenCode version, browser, and relevant environment variables.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or artifacts
      description: Paste minimal redacted logs or artifact snippets. Redact secrets and private source.
      render: text
